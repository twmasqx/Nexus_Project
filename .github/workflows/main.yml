name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # إصلاح مشكلة الصلاحيات التي تسبب خطأ 100
      - name: Fix Directory Permissions
        run: |
          git config --global --add safe.directory /home/runner/work/Nexus_Project/Nexus_Project
          sudo chown -R $USER:$USER .

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libgstreamer1.0-gstreamer-full-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good openjdk-17-jdk-headless zip unzip
          pip install --user --upgrade buildozer cython==0.29.33

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:~/.local/bin
          # تنظيف إجباري قبل البدء
          buildozer android clean
          # بدء البناء مع قبول التراخيص
          yes | buildozer android debug
        continue-on-error: false

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nexusvision-apk
          path: bin/*.apk
